<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>InkOS Xianyu Cover</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    width: 1200px;
    height: 900px;
    overflow: hidden;
    font-family: Inter, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    color: #eefcff;
    background:
      radial-gradient(circle at 15% 8%, rgba(0, 229, 204, .42), transparent 25%),
      radial-gradient(circle at 88% 20%, rgba(103, 80, 255, .35), transparent 28%),
      linear-gradient(135deg, #051016 0%, #071823 48%, #03060d 100%);
  }
  .grid {
    position: absolute;
    inset: 0;
    background-image: linear-gradient(rgba(74, 222, 228, .08) 1px, transparent 1px), linear-gradient(90deg, rgba(74, 222, 228, .08) 1px, transparent 1px);
    background-size: 86px 86px;
    mask-image: linear-gradient(to bottom, rgba(0,0,0,.9), rgba(0,0,0,.22));
  }
  .wrap { position: relative; padding: 80px 86px; height: 100%; }
  .pill { display: inline-flex; gap: 12px; align-items: center; padding: 13px 22px; border: 1px solid rgba(74,222,228,.45); border-radius: 999px; color: #12f2df; letter-spacing: .22em; font-weight: 800; font-size: 18px; background: rgba(5, 28, 38, .72); }
  h1 { margin: 46px 0 16px; font-size: 90px; line-height: .98; letter-spacing: -0.06em; max-width: 780px; }
  .sub { font-size: 31px; line-height: 1.45; color: #b6d0d6; max-width: 770px; font-weight: 600; }
  .cards { position: absolute; left: 86px; right: 86px; bottom: 92px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }
  .card { min-height: 132px; border: 1px solid rgba(148, 190, 205, .2); border-radius: 24px; padding: 24px; background: linear-gradient(180deg, rgba(12, 34, 48, .86), rgba(5, 17, 26, .72)); box-shadow: 0 18px 70px rgba(0, 0, 0, .3); }
  .num { color: #10f1d7; font-size: 32px; font-weight: 900; letter-spacing: -.04em; }
  .txt { margin-top: 12px; color: #d5edf2; font-size: 22px; font-weight: 750; line-height: 1.25; }
  .tag { position: absolute; right: 86px; top: 88px; padding: 18px 24px; border-radius: 20px; background: rgba(0, 229, 204, .13); color: #10f1d7; font-weight: 800; font-size: 22px; }
</style>
</head>
<body>
  <div class="grid"></div>
  <main class="wrap">
    <div class="pill">INKOS / STORYPILOT</div>
    <div class="tag">真实截图 + 源码交付</div>
    <h1>AI 小说创作<br/>Web 工作台</h1>
    <p class="sub">书籍管理、对话式创作、章节审稿、市场雷达、模型服务配置一体化，适合网文/短篇/内容团队二开与自用。</p>
    <section class="cards">
      <div class="card"><div class="num">01</div><div class="txt">多 Agent 写审改流程</div></div>
      <div class="card"><div class="num">02</div><div class="txt">Studio + CLI + TUI</div></div>
      <div class="card"><div class="num">03</div><div class="txt">模型服务商可视化配置</div></div>
      <div class="card"><div class="num">04</div><div class="txt">真相文件与连续性管理</div></div>
    </section>
  </main>
</body>
</html>
